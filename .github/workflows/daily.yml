name: GitHub Trending Top 10 Daily Report

on:
  schedule:
    # 每天美东 6:00 AM = UTC 11:00 AM (EST)
    # 夏令时期间美东 6:00 AM = UTC 10:00 AM (EDT)
    - cron: '0 10 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libffi-dev libcairo2 fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Check if today's report already exists
        id: check
        run: |
          TODAY=$(TZ="America/New_York" date +%Y-%m-%d)
          if [ -f "reports/${TODAY}.pdf" ] && [ -f "reports/${TODAY}.json" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate report
        if: steps.check.outputs.skip != 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd src && python main.py

      - name: Commit and push
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ README.md
          git diff --staged --quiet || (git commit -m "📊 Daily Trending Report $(TZ='America/New_York' date +%Y-%m-%d)" && git push)
