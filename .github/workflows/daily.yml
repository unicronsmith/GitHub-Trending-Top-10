name: GitHub Trending Top 10 Daily Report

on:
  schedule:
    # 每天美东 6:00 AM = UTC 11:00 AM (EST, UTC-5)
    # 夏令时期间美东 6:00 AM = UTC 10:00 AM (EDT, UTC-4)
    # 使用 UTC 11:00 覆盖标准时间
    - cron: '0 11 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libffi-dev libcairo2 fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: cd src && python main.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || (git commit -m "📊 Daily Trending Report $(date -d 'TZ=\"America/New_York\"' +%Y-%m-%d)" && git push)
